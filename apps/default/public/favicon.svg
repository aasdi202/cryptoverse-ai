<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A1929"/>
      <stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#4285f4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="13" stroke="url(#gold)" stroke-width="1" fill="none" opacity="0.6"/>
  <!-- CV monogram -->
  <!-- C shape (left arc) -->
  <path d="M10 10 Q6 16 10 22" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M10 10 L13 10" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M10 22 L13 22" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- V shape (right) -->
  <path d="M15 10 L18.5 22 L22 10" stroke="url(#accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- AI dot -->
  <circle cx="27" cy="7" r="2.5" fill="url(#gold)" opacity="0.9"/>
</svg>
